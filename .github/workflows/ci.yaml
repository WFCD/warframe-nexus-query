name: CI
on:
  pull_request:
    branches:
      - master
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'
        cache: npm
    - run: npm ci
    - run: npm run lint
    - name: Run commitlint
      run: npx commitlint --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} --to ${{ github.event.pull_request.head.sha }} --verbose
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      pull-requests: write
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        node-version: ['lts/krypton', 'lts/*', '26']
    steps:
      - name: Set up WARP
        uses: fscarmen/warp-on-actions@37ce1997e075435a827991dabcce1d080c1fe512 # v1.4
        with:
          stack: dual
          mode: wireguard
      - name: Sleep before Test Run
        if: matrix.node-version != 'lts/krypton'
        run: echo "Sleeping for 1m to allow previous cleanup" && sleep 60
        shell: bash
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          CI: true
          NEXUSHUB_USER_KEY: ${{ secrets.NEXUSHUB_USER_KEY }}
          NEXUSHUB_USER_SECRET: ${{ secrets.NEXUSHUB_USER_SECRET }}
      - name: Coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        if: matrix.node-version == 'lts/krypton'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
