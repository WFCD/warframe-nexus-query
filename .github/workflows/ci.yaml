name: CI
on:
  pull_request:
    branches:
      - master
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'
        cache: npm
    - run: npm ci
    - run: npm run lint
    - name: Run commitlint
      run: npx commitlint --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} --to ${{ github.event.pull_request.head.sha }} --verbose
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      pull-requests: write
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        node-version: ['lts/jod', 'lts/hydrogen', 'lts/iron', 'lts/*']
    steps:
      - name: Set up WARP
        uses: fscarmen/warp-on-actions@37ce1997e075435a827991dabcce1d080c1fe512 # v1.4
        with:
          stack: dual
          mode: wireguard
      - name: Sleep before Test Run
        if: matrix.node-version != 'lts/jod'
        run: echo "Sleeping for 1m to allow previous cleanup" && sleep 60
        shell: bash
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          CI: true
          NEXUSHUB_USER_KEY: ${{ secrets.NEXUSHUB_USER_KEY }}
          NEXUSHUB_USER_SECRET: ${{ secrets.NEXUSHUB_USER_SECRET }}
      - name: Coveralls
        uses: coverallsapp/github-action@master
        if: matrix.node-version == 'lts/jod'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
